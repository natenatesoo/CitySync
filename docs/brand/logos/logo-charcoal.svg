<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <title>City/Sync Logo — Charcoal Background</title>
  <!-- Background -->
  <rect width="600" height="180" fill="#15151E"/>
  <!-- CITY wordmark in white -->
  <text x="30" y="125"
    font-family="'Rajdhani', 'Arial Black', sans-serif"
    font-weight="700"
    font-size="80"
    letter-spacing="4"
    fill="#FFFFFF"
    text-anchor="start">CITY</text>
  <!-- Left slash: outlined white -->
  <polygon points="290,28 308,28 316,152 298,152"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"/>
  <!-- Right slash: outlined gold -->
  <polygon points="308,28 326,28 334,152 316,152"
    fill="none"
    stroke="#DD9E33"
    stroke-width="4"/>
  <!-- SYNC wordmark in gold -->
  <text x="340" y="125"
    font-family="'Rajdhani', 'Arial Black', sans-serif"
    font-weight="700"
    font-size="80"
    letter-spacing="4"
    fill="#DD9E33"
    text-anchor="start">SYNC</text>
</svg>
