<svg viewBox="0 0 148 30" xmlns="http://www.w3.org/2000/svg" aria-label="CITY//SYNC">
  <!-- CITY wordmark in royal blue -->
  <text y="26"
    font-family="'Rajdhani','Arial Black',sans-serif"
    font-weight="700"
    font-size="28"
    letter-spacing="2"
    fill="#4169E1">CITY</text>
  <!-- Left slash: outlined parallelogram in royal blue -->
  <polygon points="66,26 70,26 77,4 73,4"
    fill="none"
    stroke="#4169E1"
    stroke-width="1"/>
  <!-- Right slash: solid white parallelogram -->
  <polygon points="73,26 77,26 84,4 80,4"
    fill="#FFFFFF"/>
  <!-- SYNC wordmark in white -->
  <text x="87" y="26"
    font-family="'Rajdhani','Arial Black',sans-serif"
    font-weight="700"
    font-size="28"
    letter-spacing="2"
    fill="#FFFFFF">SYNC</text>
</svg>
